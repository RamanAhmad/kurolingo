# ────────────────────────────────────────────────────────────────────────────
#  Kurdolingo — nginx Production Config
#
#  Setup:
#    1. Install: sudo apt install nginx certbot python3-certbot-nginx
#    2. Copy to: sudo cp nginx.conf /etc/nginx/sites-available/kurdolingo
#    3. Enable:  sudo ln -s /etc/nginx/sites-available/kurdolingo \
#                           /etc/nginx/sites-enabled/kurdolingo
#    4. Test:    sudo nginx -t
#    5. Reload:  sudo systemctl reload nginx
#    6. TLS:     sudo certbot --nginx -d kurdolingo.de -d www.kurdolingo.de
#
#  Replace YOUR_DOMAIN with your actual domain before deploying.
# ────────────────────────────────────────────────────────────────────────────

upstream kurdolingo_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name kurdolingo.de www.kurdolingo.de;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: permanent redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kurdolingo.de www.kurdolingo.de;

    # ── TLS (certbot fills these in automatically) ────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/kurdolingo.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kurdolingo.de/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/kurdolingo.de/chain.pem;

    # Modern TLS config (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # ── Rate limiting (nginx-level, before hitting Node) ──────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://kurdolingo_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Body size (matches Node body-parser limit)
        client_max_body_size 100k;
    }

    # Tighter limit for login/register
    location ~ ^/api/auth/(login|register)$ {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://kurdolingo_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10k;
    }

    # ── Uploads (served directly by nginx — faster than Node static) ──────────
    location /uploads/ {
        alias /app/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Max upload file size (matches multer limit)
        client_max_body_size 30m;
    }

    # ── Frontend static files ─────────────────────────────────────────────────
    # Option A: nginx serves the built frontend directly (recommended)
    root /app/frontend/dist;

    # Long cache for hashed assets (Vite adds content hash to filenames)
    location ~* \.(js|css|woff2?|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # CRITICAL: React Router needs this. Any URL that doesn't match a file
    # must return index.html so the client-side router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
