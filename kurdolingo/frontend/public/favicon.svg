<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFE033"/>
      <stop offset="100%" stop-color="#FFAA00"/>
    </radialGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#EDE8DC"/>
    </radialGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B1A"/>
      <stop offset="60%" stop-color="#FF4500"/>
      <stop offset="100%" stop-color="#E83A00"/>
    </linearGradient>
  </defs>

  <!-- App icon background — rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- ── K letter — two vertical bars + diagonal ── -->
  <!-- Left vertical bar -->
  <rect x="108" y="130" width="58" height="262" rx="28" fill="#2E8B3A"/>
  <!-- Middle vertical bar -->
  <rect x="192" y="130" width="58" height="262" rx="28" fill="#2E8B3A"/>
  <!-- Diagonal leg (bottom-right of K) -->
  <path d="M238 265 L390 400" stroke="#2E8B3A" stroke-width="60" stroke-linecap="round" fill="none"/>

  <!-- ── Arc / swoosh — orange-red ribbon ── -->
  <path d="M148 295 Q240 180 360 178"
        stroke="url(#arcGrad)" stroke-width="52" stroke-linecap="round"
        fill="none"/>

  <!-- ── Sun — yellow circle with rays ── -->
  <!-- Rays first (behind circle) -->
  <g transform="translate(358,148)">
    <g stroke="#FFCC00" stroke-width="7" stroke-linecap="round">
      <line x1="0" y1="-54" x2="0" y2="-72"/>
      <line x1="38" y1="-38" x2="51" y2="-51"/>
      <line x1="54" y1="0" x2="72" y2="0"/>
      <line x1="38" y1="38" x2="51" y2="51"/>
      <line x1="0" y1="54" x2="0" y2="72"/>
      <line x1="-38" y1="38" x2="-51" y2="51"/>
      <line x1="-54" y1="0" x2="-72" y2="0"/>
      <line x1="-38" y1="-38" x2="-51" y2="-51"/>
    </g>
    <!-- Sun body -->
    <circle r="44" fill="url(#sunGrad)"/>
    <!-- Subtle highlight -->
    <circle cx="-10" cy="-12" r="14" fill="rgba(255,255,255,0.28)"/>
  </g>
</svg>